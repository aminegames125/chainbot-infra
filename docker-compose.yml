version: '3.8'

services:
  geth:
    image: ethereum/client-go:v1.13.14
    container_name: geth-node
    restart: unless-stopped
    command:
      - --networkid=13371
      - --http
      - --http.addr=0.0.0.0
      - --http.port=8545
      - --http.corsdomain=*
      - --http.vhosts=*
      - --http.api=eth,net,web3,txpool,debug,engine
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=8546
      - --ws.origins=*
      - --ws.api=eth,net,web3,txpool,debug,engine
      - --syncmode=full
      - --nodiscover
      - --authrpc.port=8551
      - --authrpc.vhosts=*
      - --authrpc.addr=0.0.0.0
      - --authrpc.jwtsecret=/root/jwt.hex
    ports:
      - "8545:8545"
      - "8546:8546"
    volumes:
      - ./geth/data:/root/.ethereum
      - ./geth/keystore:/root/.ethereum/keystore

  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zenith
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: zenith
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenith -d zenith"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── BOT SERVICE ────────────────────────────────────────────────────────────
  bot:
    build: .
    container_name: zenith_bot
    restart: always
    command: sh -c "npx prisma migrate deploy && npm start"
    depends_on:
      postgres:
        condition: service_healthy
      geth:
        condition: service_started
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - RPC_URL=http://geth:8545
      - WS_URL=ws://geth:8546
      - DATABASE_URL=postgresql://zenith:${DATABASE_PASSWORD}@postgres:5432/zenith
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - BOT_WALLET_PRIVATE_KEY=${BOT_WALLET_PRIVATE_KEY}
      - CHAIN_ID=13371

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - geth
