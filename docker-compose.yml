version: '3.8'

services:
  geth:
    image: ethereum/client-go:v1.13.14
    container_name: geth-node
    restart: unless-stopped
    command:
      - --networkid=13371
      - --http
      - --http.addr=0.0.0.0
      - --http.port=8545
      - --http.corsdomain=*
      - --http.api=eth,net,web3,txpool,debug
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=8546
      - --ws.origins=*
      - --ws.api=eth,net,web3,txpool,debug
      - --syncmode=full
      - --mine
      - --miner.etherbase=0x0000000000000000000000000000000000000000
    ports:
      - "8545:8545"
      - "8546:8546"
    volumes:
      - ./packages/geth/data:/root/.ethereum
      - ./packages/geth/keystore:/root/.ethereum/keystore

  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: chainbot
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: chainbot
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  discord-bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    container_name: discord-bot
    restart: unless-stopped
    depends_on:
      - geth
      - postgres
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - RPC_URL=http://geth:8545
      - WS_URL=ws://geth:8546
      - DATABASE_URL=postgres://chainbot:${DB_PASSWORD}@postgres:5432/chainbot
      - TREASURY_PRIVATE_KEY=${TREASURY_PRIVATE_KEY}

  nextjs-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: nextjs-web
    restart: unless-stopped
    depends_on:
      - geth
      - postgres
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_RPC_URL=https://chainbot.animeos.dev/rpc
      - DATABASE_URL=postgres://chainbot:${DB_PASSWORD}@postgres:5432/chainbot

  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
    container_name: chainbot-docs
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./packages/nginx/chainbot.conf:/etc/nginx/conf.d/default.conf
      - ./packages/nginx/certs:/etc/nginx/certs
    depends_on:
      - geth
      - nextjs-web
      - docs

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
